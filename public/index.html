<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Automation - Pro Console</title>
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>任务面板</h1>
        <p class="subtitle">导入脚本，设定规则，直接运行。</p>
      </div>
      <div class="topbar-actions">
        <select id="browser-profile-select" style="height:36px;padding:0 8px;border-radius:6px;border:1px solid var(--border-color);background:var(--card-bg);color:var(--text-color);font-size:13px;">
          <option value="">默认配置</option>
        </select>
        <button id="open-browser-btn" type="button" class="alt btn-with-icon" data-testid="open-browser-btn">
          <i data-lucide="monitor-play" class="icon-sm"></i> 启动浏览器
        </button>
        <button id="close-browser-btn" type="button" class="alt btn-with-icon" data-testid="close-browser-btn">
          <i data-lucide="monitor-stop" class="icon-sm"></i> 关闭浏览器
        </button>
        <button id="tab-tasks" class="tab-btn active btn-with-icon" type="button" role="tab" data-tab="tasks-tab" aria-controls="tasks-tab" aria-selected="true" style="margin-left: 20px;">
          <i data-lucide="layout-dashboard" class="icon-sm"></i> 任务看板
        </button>
        <button id="tab-profiles" class="tab-btn btn-with-icon" type="button" role="tab" data-tab="profiles-tab" aria-controls="profiles-tab" aria-selected="false">
          <i data-lucide="monitor-smartphone" class="icon-sm"></i> 浏览器配置
        </button>
        <button id="tab-config" class="tab-btn btn-with-icon" type="button" role="tab" data-tab="config-tab" aria-controls="config-tab" aria-selected="false">
          <i data-lucide="settings-2" class="icon-sm"></i> 全局配置
        </button>
      </div>
    </header>

    <main class="content">
      <div id="tasks-tab" class="tab-content active" role="tabpanel" aria-labelledby="tab-tasks">
        <section>
          <div class="section-header">
            <div>
              <h2>任务</h2>
              <p>一个任务一张卡片。</p>
            </div>
            <button id="add-task-btn" type="button" class="btn-primary btn-with-icon" data-testid="add-task-btn">
              <i data-lucide="plus-circle" class="icon-sm"></i> 添加任务
            </button>
          </div>
          <div id="tasks" class="task-grid"></div>
        </section>
      </div>

      <div id="profiles-tab" class="tab-content" role="tabpanel" aria-labelledby="tab-profiles" hidden>
        <section class="modal-panel config-panel">
          <div class="section-header compact">
            <div>
              <h2>浏览器配置</h2>
              <p class="muted">每个配置对应一套独立的浏览器数据目录，可绑定不同代理。</p>
            </div>
            <button id="add-profile-btn" type="button" class="btn-primary btn-with-icon">
              <i data-lucide="plus-circle" class="icon-sm"></i> 新建配置
            </button>
          </div>
          <div id="profiles-list" class="stack-form" style="gap:12px;"></div>
        </section>
      </div>

      <div id="config-tab" class="tab-content" role="tabpanel" aria-labelledby="tab-config" hidden>
        <section class="modal-panel config-panel">
          <div class="section-header compact">
            <div>
              <h2>Telegram 通知</h2>
              <p id="tg-status-text" class="muted">状态：加载中...</p>
            </div>
          </div>
          <form id="tg-form" class="grid single-col">
            <div>
              <label class="field-label" for="tg-bot-token">Bot Token</label>
              <input type="password" name="botToken" id="tg-bot-token" placeholder="输入新的 Token" />
              <div id="tg-token-help" class="schedule-note" style="margin-top: 4px;"></div>
            </div>
            <div>
              <label class="field-label" for="tg-chat-id">Chat ID</label>
              <input type="text" name="chatId" id="tg-chat-id" placeholder="例如: 123456789" />
            </div>
            <div class="row" style="margin-top: 8px;">
              <button type="submit" id="tg-save-btn" class="btn-primary btn-with-icon">
                <i data-lucide="save" class="icon-sm"></i> 保存设置
              </button>
              <button type="button" class="alt btn-with-icon" id="tg-test-btn">
                <i data-lucide="send" class="icon-sm"></i> 发送测试消息
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <div id="modal-mask" class="modal-mask" hidden></div>
  <section id="task-modal" class="modal modal-wide" aria-hidden="true">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">新建任务</h2>
      </div>
      <button id="modal-close-btn" class="icon-btn" type="button" data-testid="modal-close-btn" aria-label="关闭">
        <i data-lucide="x" class="icon-md"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-layout two-col-modal">
        <section class="modal-panel">
          <h3 id="form-title">任务信息</h3>
          <p class="muted" id="form-hint">只填任务名和定时规则。</p>
          <form id="task-form" class="stack-form">
            <div class="grid single-col">
              <input name="name" placeholder="任务名称" required data-testid="task-name-input" />
              <div>
                <label class="field-label" for="task-profile-select">浏览器配置</label>
                <select id="task-profile-select" style="width:100%;">
                  <option value="">默认配置</option>
                </select>
              </div>
              <input type="hidden" name="type" value="javascript" />
              <input type="hidden" name="script_path" required />
              <input type="hidden" name="timeout_sec" value="300" />
              <input type="hidden" name="browser_profile_id" id="task-profile-id" value="" />
            </div>

            <div class="config-block">
              <div class="section-header compact">
                <div>
                  <h4>定时规则</h4>
                  <p>不启用就手动运行。</p>
                </div>
              </div>

              <label class="inline-check"><input type="checkbox" name="enabled" data-testid="schedule-enabled-checkbox" /> 启用定时</label>

              <div class="grid single-col schedule-mode-select-wrap">
                <select name="schedule_mode" id="schedule-mode-select" data-testid="schedule-mode-select">
                  <option value="fixed">固定周期</option>
                  <option value="interval">随机区间</option>
                </select>
              </div>

              <div id="fixed-schedule-fields" class="schedule-pane">
                <p class="schedule-note">固定周期：按固定间隔重复执行。</p>
                <div class="grid three-col-tight">
                  <div>
                    <label class="field-label">天</label>
                    <input name="fixed_days" type="number" min="0" value="0" data-testid="fixed-days-input" />
                  </div>
                  <div>
                    <label class="field-label">时</label>
                    <input name="fixed_hours" type="number" min="0" value="4" data-testid="fixed-hours-input" />
                  </div>
                  <div>
                    <label class="field-label">分</label>
                    <input name="fixed_minutes" type="number" min="0" value="0" data-testid="fixed-minutes-input" />
                  </div>
                </div>
                <div id="fixed-schedule-summary" class="field-span-2 muted">每隔 0 天 4 小时 0 分钟执行一次</div>
              </div>

              <div id="interval-schedule-fields" class="schedule-pane" hidden>
                <p class="schedule-note">随机区间：每次在最小值到最大值之间随机取一个间隔。</p>
                <div class="grid interval-range-grid">
                  <div>
                    <label class="field-label">最小值</label>
                    <input name="interval_min" type="number" min="1" value="5" data-testid="interval-min-input" />
                  </div>
                  <div class="range-sep">至</div>
                  <div>
                    <label class="field-label">最大值</label>
                    <input name="interval_max" type="number" min="1" value="10" data-testid="interval-max-input" />
                  </div>
                  <div>
                    <label class="field-label">单位</label>
                    <select name="interval_unit" data-testid="interval-unit-select">
                      <option value="minutes">分钟</option>
                      <option value="hours">小时</option>
                      <option value="days">天</option>
                    </select>
                  </div>
                </div>
                <div id="interval-schedule-summary" class="field-span-2 muted">每次检查将在 5 - 10 分钟内随机触发</div>
              </div>

              <input type="hidden" name="cron_expr" />
            </div>

            <div class="row">
              <button type="submit" id="save-btn" class="btn-primary btn-with-icon" data-testid="save-task-btn">
                <i data-lucide="check" class="icon-sm"></i> 保存任务
              </button>
              <button type="button" class="alt btn-with-icon" id="reset-btn" data-testid="cancel-task-btn">
                <i data-lucide="x" class="icon-sm"></i> 取消
              </button>
            </div>
          </form>
        </section>

        <section class="modal-panel">
           <div class="section-header compact">
             <div>
               <h3>脚本</h3>
               <p>导入一个脚本，或选择已有脚本。</p>
             </div>
            <button type="button" class="alt" id="refresh-scripts-modal-btn" data-testid="refresh-scripts-btn">刷新列表</button>
          </div>

          <form id="modal-import-form" class="stack-form">
            <select name="type" data-testid="script-type-select">
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
            </select>
            <textarea name="content" rows="12" placeholder="粘贴脚本内容" required data-testid="script-content-textarea"></textarea>
            <div class="row">
               <button type="submit" id="modal-import-btn" data-testid="import-script-btn">导入脚本</button>
            </div>
          </form>

          <div class="section-header compact with-top-gap">
            <div>
               <h4>已有脚本</h4>
               <p>直接选，不要大卡片。</p>
            </div>
          </div>
          <div class="script-picker">
            <select id="script-select" data-testid="script-select">
              <option value="">请选择脚本</option>
            </select>
            <div class="row script-picker-actions">
              <button type="button" class="alt" id="use-script-btn">选中脚本</button>
              <button type="button" class="alt" id="edit-script-btn">编辑脚本</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </section>

  <script src="/app.js"></script>
  <script>
    // Initialize Lucide icons on static elements
    lucide.createIcons();
    // Monkey-patch generic DOM modifications wouldn't hurt but just static for now is neat.
  </script>
</body>
</html>
